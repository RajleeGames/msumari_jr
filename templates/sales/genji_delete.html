{% extends "base.html" %}

{% block title %}Delete Genji{% endblock %}

{% block content %}
<div class="container" style="max-width:560px;">
  <div class="card border-0 shadow-sm rounded-4">
    <div class="card-body p-4">
      <h3 class="fw-bold mb-3">Delete Genji Record</h3>
      <p>Are you sure you want to delete <strong>{{ obj.item_name }}</strong>?</p>

      <form method="post">
        {% csrf_token %}
        <div class="d-flex gap-2">
          <button type="submit" class="btn btn-danger px-4">Delete</button>
          <a href="{% url 'sales:genji_dashboard' %}" class="btn btn-light px-4">Cancel</a>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
