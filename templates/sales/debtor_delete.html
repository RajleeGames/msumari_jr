{% extends "base.html" %}
{% block title %}Delete Debtor{% endblock %}

{% block content %}
<div class="container-fluid py-3" style="max-width:750px;">
  <div class="card border-0 shadow-sm">
    <div class="card-body">
      <h5 class="mb-2">Delete Debtor</h5>
      <p class="text-muted mb-3">
        Are you sure you want to delete <b>{{ debtor.name }}</b>?
      </p>

      <form method="post">
        {% csrf_token %}
        <a href="{% url 'sales:debtor_list' %}" class="btn btn-outline-secondary">Cancel</a>
        <button class="btn btn-danger" type="submit">
          <i class="fa-solid fa-trash me-1"></i> Delete
        </button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
