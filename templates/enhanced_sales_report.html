{% extends "base.html" %}
{% block title %}Enhanced Sales Report{% endblock %}

{% block content %}
<div class="container my-4">
  <h1 class="text-center mb-4">Enhanced Sales Report</h1>
  
  <!-- Daily Sales Chart -->
  <div class="chart-container mb-4" style="position: relative; height:150px; width:50%; margin:auto;">
    <h2 class="text-center">Daily Sales</h2>
    <canvas id="dailySalesChart"></canvas>
  </div>
   <br/>
  <!-- Weekly Sales Chart -->
  <div class="chart-container mb-4" style="position: relative; height:150px; width:50%; margin:auto;">
    <h2 class="text-center">Weekly Sales</h2>
    <canvas id="weeklySalesChart"></canvas>
  </div>
   <br/>
  <!-- Monthly Sales Chart -->
  <div class="chart-container mb-4" style="position: relative; height:150px; width:50%; margin:auto;">
    <h2 class="text-center">Monthly Sales</h2>
    <canvas id="monthlySalesChart"></canvas>
  </div>
   <br/>
  <!-- Yearly Sales Chart -->
  <div class="chart-container mb-4" style="position: relative; height:150px; width:50%; margin:auto;">
    <h2 class="text-center">Yearly Sales</h2>
    <canvas id="yearlySalesChart"></canvas>
  </div>
   <br/>
  <!-- Sales vs Expenses vs Profit with Month/Year Filter -->
  <div class="chart-container mb-4" style="position: relative; height:200px; width:50%; margin:auto;">
    <h2 class="text-center">Sales vs Expenses vs Profit</h2>

    <!-- Filter Form + Reset -->
    <form method="get" class="d-flex justify-content-center mb-2 gap-2">
      <select name="doughnut_month" class="form-select form-select-sm">
        <option value="1"  {% if doughnut_month == 1  %}selected{% endif %}>January</option>
        <option value="2"  {% if doughnut_month == 2  %}selected{% endif %}>February</option>
        <option value="3"  {% if doughnut_month == 3  %}selected{% endif %}>March</option>
        <option value="4"  {% if doughnut_month == 4  %}selected{% endif %}>April</option>
        <option value="5"  {% if doughnut_month == 5  %}selected{% endif %}>May</option>
        <option value="6"  {% if doughnut_month == 6  %}selected{% endif %}>June</option>
        <option value="7"  {% if doughnut_month == 7  %}selected{% endif %}>July</option>
        <option value="8"  {% if doughnut_month == 8  %}selected{% endif %}>August</option>
        <option value="9"  {% if doughnut_month == 9  %}selected{% endif %}>September</option>
        <option value="10" {% if doughnut_month == 10 %}selected{% endif %}>October</option>
        <option value="11" {% if doughnut_month == 11 %}selected{% endif %}>November</option>
        <option value="12" {% if doughnut_month == 12 %}selected{% endif %}>December</option>
      </select>

      <select name="doughnut_year" class="form-select form-select-sm">
        <option value="2024" {% if doughnut_year == 2024 %}selected{% endif %}>2024</option>
        <option value="2025" {% if doughnut_year == 2025 %}selected{% endif %}>2025</option>
        <option value="2026" {% if doughnut_year == 2026 %}selected{% endif %}>2026</option>
        <option value="2027" {% if doughnut_year == 2027 %}selected{% endif %}>2027</option>
        <option value="2028" {% if doughnut_year == 2028 %}selected{% endif %}>2028</option>
        <option value="2029" {% if doughnut_year == 2029 %}selected{% endif %}>2029</option>
        <option value="2030" {% if doughnut_year == 2030 %}selected{% endif %}>2030</option>
      </select>

      <button type="submit" class="btn btn-sm btn-primary">Filter</button>
      <a href="{{ request.path }}" class="btn btn-sm btn-secondary">Reset</a>
    </form>

    <canvas id="profitExpensesChart"></canvas>
  </div>
</div>

<!-- JSON Data for Charts -->
<script id="daily-sales-data"   type="application/json">{{ daily_sales_json|safe }}</script>
<script id="weekly-sales-data"  type="application/json">{{ weekly_sales_json|safe }}</script>
<script id="monthly-sales-data" type="application/json">{{ monthly_sales_json|safe }}</script>
<script id="yearly-sales-data"  type="application/json">{{ yearly_sales_json|safe }}</script>

<!-- Doughnut Aggregates -->
<script>
  const monthlySalesTotal = parseFloat("{{ doughnut_sales_total }}");
  const totalExpenses     = parseFloat("{{ doughnut_total_expenses }}");
  const netProfit         = parseFloat("{{ doughnut_net_profit }}");
</script>

<!-- Chart.js CDN -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script>
  // Parse JSON data
  const dailyData   = JSON.parse(document.getElementById('daily-sales-data').textContent);
  const weeklyData  = JSON.parse(document.getElementById('weekly-sales-data').textContent);
  const monthlyData = JSON.parse(document.getElementById('monthly-sales-data').textContent);
  const yearlyData  = JSON.parse(document.getElementById('yearly-sales-data').textContent);

  // Render time‑series
  new Chart(document.getElementById('dailySalesChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: dailyData.map(i => i.day),
      datasets: [{ label:'Sales', data: dailyData.map(i => i.total), fill:true }]
    },
    options: { responsive:true, maintainAspectRatio:false }
  });

  new Chart(document.getElementById('weeklySalesChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: weeklyData.map(i => i.week),
      datasets: [{ label:'Sales', data: weeklyData.map(i => i.total) }]
    },
    options: { responsive:true, maintainAspectRatio:false }
  });

  new Chart(document.getElementById('monthlySalesChart').getContext('2d'), {
    type: 'line',
    data: {
      labels: monthlyData.map(i => `${i.month}/${i.year}`),
      datasets: [{ label:'Sales', data: monthlyData.map(i => i.total), fill:true }]
    },
    options: { responsive:true, maintainAspectRatio:false }
  });

  new Chart(document.getElementById('yearlySalesChart').getContext('2d'), {
    type: 'bar',
    data: {
      labels: yearlyData.map(i => i.year),
      datasets: [{ label:'Sales', data: yearlyData.map(i => i.total) }]
    },
    options: { responsive:true, maintainAspectRatio:false }
  });

  // Doughnut
  new Chart(document.getElementById('profitExpensesChart').getContext('2d'), {
    type: 'doughnut',
    data: {
      labels: ['Sales','Expenses','Profit'],
      datasets: [{ data: [monthlySalesTotal, totalExpenses, netProfit] }]
    },
    options: {
      responsive:true,
      maintainAspectRatio:false,
      plugins:{ legend:{position:'bottom'} }
    }
  });
</script>
{% endblock %}
